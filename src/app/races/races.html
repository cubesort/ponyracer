@if (races.isLoading()) {
  <div role="status">Loading.</div>
} @else if (races.error()) {
  <div class="alert alert-danger" role="alert">An error occurred while loading races.</div>
} @else {
  @for (race of races.value(); track race.id) {
    <div>
      <pr-race [raceModel]="race" />
    </div>
  }
}
