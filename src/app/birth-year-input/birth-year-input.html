<div class="row d-flex align-items-center">
  <div class="col-2">
    <input
      [id]="inputId()"
      class="form-control"
      [class.is-invalid]="touched() && invalid()"
      type="number"
      [value]="rawValue()"
      [disabled]="disabled()"
      (input)="onBirthYearChange($event)"
      (blur)="touch.emit()"
    />
  </div>
  <div class="col formatted-year">
    {{ value() }}
  </div>
</div>
